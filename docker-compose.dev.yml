version: "3"
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_BASE_URL=http://localhost:8080/api
      - NUXT_PUBLIC_BACK_URL=http://localhost:8080
      - NUXT_PUBLIC_FRONT_URL=http://localhost:3000
      - API_BASE_URL=http://localhost:8080/api
      - BACK_URL=http://localhost:8080
      - FRONT_URL=http://localhost:3000
    volumes:
      - .:/usr/src/app/nuxtjs
      - /usr/src/app/nuxtjs/node_modules
    restart: unless-stopped

